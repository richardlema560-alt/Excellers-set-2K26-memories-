<!DOCTYPE html>
<html>

<head>
    <title>Upload Memory - Excellers Set 2026</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header>
    <h1>📤 Upload Memory</h1>
    <p>Share your favourite Excellers Set 2026 moments</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="signout.html">Sign Out</a>
    <a href="transitionday.html">Transition Day</a>
    <a href="classroommoments.html">Classroom Moments</a>
    <a href="jerseyday.html">Jersey Day</a>
</nav>


<section class="upload-box">

<h2>Add A New Memory</h2>

<form id="uploadForm">

<label>Your Name</label>
<input type="text" id="name" placeholder="Enter your name" required>


<label>Choose Category</label>

<select id="event" required>

<option value="">Select memory type</option>
<option value="Sign Out Day">Sign Out Day</option>
<option value="Transition Day">Transition Day</option>
<option value="Classroom Moments">Classroom Moments</option>
<option value="Jersey Day">Jersey Day</option>

</select>


<label>Memory Description</label>

<textarea 
id="description"
placeholder="Tell us about this moment"
rows="5"></textarea>


<label>Select Photo or Video</label>

<input 
type="file"
id="file"
accept="image/*,video/*"
required>


<button type="submit">
Upload Memory
</button>


<p id="status"></p>


</form>

</section>


<footer>

<p>
© 2026 Excellers Set Memories | Forever Together
</p>

</footer>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="upload.js"></script>

</body>

</html>
